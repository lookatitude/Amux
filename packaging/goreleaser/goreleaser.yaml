# Amux release pipeline (T3 devops, work package D3).
#
# ADR-0007 Decision 1 selected GoReleaser over a hand-rolled make+go build matrix
# (rejected: re-implements checksums/archives/reproducibility GoReleaser
# standardises). This config produces the MVP artifacts: reproducible
# CGO_ENABLED=0 linux amd64/arm64 tarballs for `amux` and `amuxd`, SHA-256
# checksums, and per-archive SBOMs. Provenance/attestation and the reproducible
# build-input record are produced alongside by the release workflow
# (.github/workflows/release.yml) and scripts/release/record-provenance.sh — see
# docs/release/artifact-verification.md for the full artifact set + how to verify.
#
# Publishing is intentionally NOT wired here: `release.disable: true` plus the
# workflow's `--snapshot` mean this file can BUILD a candidate but can never push
# a public release. External publication is a separate, explicitly user-authorized
# operation (autonomy policy: publishing externally requires confirmation).
#
# The AUR binary package is hand-authored (packaging/aur/PKGBUILD) and consumes
# these released tarballs; GoReleaser does NOT generate AUR metadata (ADR-0007).
#
# Invoke via `make release-snapshot` / `make release-check` so the pinned
# GoReleaser version (scripts/tools.env, currently v2.12.7) is used. This file's
# real floor is GoReleaser >= 2.8: `archives[].formats` landed in v2.6, but
# `archives[].ids` only landed in v2.8 (v2.6/v2.7 hard-fail with "field ids not
# found in type config.Archive" under GoReleaser's strict decoder). Config and
# pin move together — see scripts/tools.env for the coherence note.
version: 2

project_name: amux

# Pins the mtime of dist/metadata.json + dist/artifacts.json to the commit.
# NOTE: this key does NOT affect archive contents (GoReleaser applies it only to
# those two metadata files). Archive reproducibility comes from
# builds[].mod_timestamp (binaries) plus the archives[].builds_info /
# files[].info blocks below (everything else).
metadata:
  mod_timestamp: '{{ .CommitTimestamp }}'

before:
  hooks:
    - go mod verify
    - go mod download
    # Stage generated completions OUTSIDE dist/: `release --clean` wipes dist/
    # at setup, so a before-hook that wrote into dist/completions would either
    # be erased or trip GoReleaser's non-empty-dist guard. build/completions is
    # a clean staging tree the archive `files` block references below.
    - bash scripts/gen-completions.sh build/completions

builds:
  - id: amux
    main: ./cmd/amux
    binary: amux
    env:
      - CGO_ENABLED=0            # ADR-0007 Decision 4 — cgo prohibited
    goos: [linux]
    goarch: [amd64, arm64]
    flags:
      - -trimpath               # strip local paths → reproducible binaries
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w
      - -X github.com/amux-run/amux/internal/version.Version={{ .Version }}
      - -X github.com/amux-run/amux/internal/version.Commit={{ .FullCommit }}
      - -X github.com/amux-run/amux/internal/version.Date={{ .CommitDate }}

  - id: amuxd
    main: ./cmd/amuxd
    binary: amuxd
    env:
      - CGO_ENABLED=0
    goos: [linux]
    goarch: [amd64, arm64]
    flags:
      - -trimpath
    mod_timestamp: '{{ .CommitTimestamp }}'
    ldflags:
      - -s -w
      - -X github.com/amux-run/amux/internal/version.Version={{ .Version }}
      - -X github.com/amux-run/amux/internal/version.Commit={{ .FullCommit }}
      - -X github.com/amux-run/amux/internal/version.Date={{ .CommitDate }}

archives:
  - id: amux
    ids: [amux, amuxd]        # both binaries ship in one tarball per arch
    formats: [tar.gz]
    name_template: >-
      amux_{{ .Version }}_linux_{{ .Arch }}
    # Normalise the OWNERSHIP of the packed binaries. Without this the tar
    # headers record the build user (root in a container, `runner` on a hosted
    # runner), so the same commit built by two different users yields different
    # archive bytes — measured root-vs-uid-1001 in
    # .amux-artifacts/devops-t6/release-frozen-20260722/build-user-and-sbom.log
    # The binaries' mtime is already commit-pinned by builds[].mod_timestamp.
    builds_info: { owner: root, group: root, mode: 0755 }

    # Every non-binary archive member carries an explicit commit-pinned mtime
    # and the same normalised ownership.
    # Without it the tar headers inherit wall-clock mtimes: the completions are
    # regenerated by the before-hook on every run, and LICENSE/README/docs carry
    # whatever mtime the checkout produced. Two builds of the SAME commit then
    # yield DIFFERENT tarball digests even though all four binaries are
    # bit-identical — measured, not assumed:
    # .amux-artifacts/devops-t6/release-frozen-20260722/repro-double-build-arm64.log
    # The binaries are already pinned by builds[].mod_timestamp above; `info`
    # is the per-file archive metadata key (NOT default_file_info), and `mtime`
    # must be RFC3339Nano — hence .CommitDate, not the epoch-valued
    # .CommitTimestamp that mod_timestamp takes.
    files:
      - src: build/completions/*
        dst: completions
        info: { owner: root, group: root, mode: 0644, mtime: '{{ .CommitDate }}' }
      - src: LICENSE*          # optional: included only if a LICENSE file exists
        info: { owner: root, group: root, mode: 0644, mtime: '{{ .CommitDate }}' }
      - src: README*
        info: { owner: root, group: root, mode: 0644, mtime: '{{ .CommitDate }}' }
      - src: docs/release/*.md
        dst: docs
        info: { owner: root, group: root, mode: 0644, mtime: '{{ .CommitDate }}' }
      - src: packaging/systemd/*.service
        dst: systemd
        info: { owner: root, group: root, mode: 0644, mtime: '{{ .CommitDate }}' }

checksum:
  name_template: checksums.txt
  algorithm: sha256

# One CycloneDX SBOM per released tarball. `args` is set EXPLICITLY because
# GoReleaser's default syft invocation is `--output spdx-json --enrich all`,
# which (a) writes an SPDX document into a file named `.cdx.json` — the
# extension and docs/release/artifact-verification.md both promise CycloneDX,
# and its `jq '.components[]'` recipe returns nothing against SPDX — and (b)
# makes network enrichment calls from a build that is supposed to be hermetic.
# Measured, not assumed: build-user-and-sbom.log shows the pre-fix document
# starting `{"spdxVersion":"SPDX-2.3"...}`.
sboms:
  - id: archive-sbom
    artifacts: archive
    args: ['$artifact', '--output', 'cyclonedx-json=$document']
    documents:
      - '{{ .ArtifactName }}.sbom.cdx.json'

changelog:
  use: git
  sort: asc
  groups:
    - { title: Features,       regexp: '^.*feat(\(.+\))??!?:.+$',  order: 0 }
    - { title: Bug fixes,      regexp: '^.*fix(\(.+\))??!?:.+$',   order: 1 }
    - { title: Security,       regexp: '^.*sec(\(.+\))??!?:.+$',   order: 2 }
    - { title: Others,         order: 999 }
  filters:
    exclude: ['^docs:', '^test:', '^chore:', '^ci:', 'merge conflict']

# Never publish from this config. Even a non-snapshot run produces only a local,
# draft-marked release (belt-and-braces against accidental publication).
release:
  disable: true

snapshot:
  version_template: '{{ incpatch .Version }}-snapshot-{{ .ShortCommit }}'
